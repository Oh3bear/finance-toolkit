<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内部往来核对工具</title>
    <style>
      /* 光球氛围动画 — 直接写在 HTML head，不经过 Tailwind/Lightning CSS */
      @keyframes ftk-orb1 {
        0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.35; }
        33%  { transform: translate(30px, -35px) scale(1.2); opacity: 0.5; }
        66%  { transform: translate(-20px, 20px) scale(0.85); opacity: 0.3; }
      }
      @keyframes ftk-orb2 {
        0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
        33%  { transform: translate(-25px, 30px) scale(1.15); opacity: 0.45; }
        66%  { transform: translate(15px, -25px) scale(0.9); opacity: 0.25; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
